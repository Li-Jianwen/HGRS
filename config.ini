[DEFAULT]
# ============================================
# HGR Skill 配置文件
# 人类遗传资源行政许可事项爬取
# ============================================

# 起始页面URL
base_url = https://apply.hgrg.net/login

# 数据保存目录（相对于skill目录，或绝对路径）
data_dir = ./data

# 汇总文件名
summary_filename = 汇总_中国人类遗传资源行政许可事项.xlsx

# 独立批次文件命名模板（可用 {year} {batch} 占位）
batch_filename_template = 中国人类遗传资源行政许可事项{year}年第{batch}批审批结果公示.xlsx

# PDF下载重试次数
download_retry = 3

# PDF下载超时（秒）
download_timeout = 30

# 浏览器操作超时（秒）
browser_timeout = 30

# 日志文件
log_file = hgr.log
